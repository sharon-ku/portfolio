<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Sharon Ku</title>

    <!-- Add favicon -->
    <link rel="icon" href="assets/images/logo.png" sizes="16x16" />

    <!-- CSS sheets -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Library script(s) -->
    <script src="js/libraries/p5.min.js"></script>
    <script src="js/libraries/p5.play.js"></script>
    <script src="js/libraries/p5.sound.min.js"></script>
  </head>
  <body>
    <section class="logo">
      <a href="index.html">
        <img src="assets/images/logo.png" alt="logo" />
      </a>
    </section>

    <nav id="close-button">
      <!-- Button to close the overlay navigation -->
      <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">X</a>
    </nav>

    <nav class="top-navigation">
      <a href="javascript:void(0)" class="active" onclick="openNav()">
        <p>Works ☰</p>
      </a>
    </nav>

    <section class="article">
      <section class="my-name">
        <h1>Sharon Ku</h1>
      </section>

      <section class="my-description">
        <p>
          I am a graphic designer and illustrator based in Montreal.
        </p>
      </section>

      <section class="hover-instructions">
        <p>
          Hover over the table objects to witness some magic!
        </p>
      </section>
    </section>

    <!-- Table of contents ********************************************** -->

    <section id="table-of-contents"></section>

    <!-- My scripts -->
    <script>
      /* Open when someone clicks on the span element */
      function openNav() {
        document.getElementById("table-of-contents").style.width = "100%";
        document.getElementById("table-of-contents").style.padding = "100px";
        document.getElementById("close-button").style.display = "flex";
      }

      /* Close when someone clicks on the "x" symbol inside the overlay */
      function closeNav() {
        document.getElementById("table-of-contents").style.width = "0%";
        document.getElementById("table-of-contents").style.padding = "0px";
        document.getElementById("close-button").style.display = "none";
      }
    </script>

    <script src="js/tableOfContents.js"></script>

    <!-- ********************************************** -->

    <!-- My scripts for index page -->

    <script src="js/Table.js"></script>

    <script src="js/Plant.js"></script>
    <script src="js/Butterfly.js"></script>

    <script src="js/Globe.js"></script>
    <script src="js/Snowflake.js"></script>
    <script src="js/Spark.js"></script>

    <script src="js/Whale.js"></script>
    <script src="js/Fountain.js"></script>

    <script src="js/FerrisWheel.js"></script>
    <script src="js/FerrisWheelSeat.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
