<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Sharon Ku</title>

    <!-- Add favicon -->
    <link rel="icon" href="assets/images/logo.png" sizes="16x16" />

    <!-- CSS sheets -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/work.css" />
    <link rel="stylesheet" href="css/works/rs-infographics.css" />

    <!-- JavaScript libraries -->
    <script src="js/libraries/jquery-3.6.0.min.js"></script>
  </head>

  <body>
    <!-- Top navigation ********************************************** -->
    <section class="logo">
      <a href="index.html">
        <img src="assets/images/logo.png" alt="logo" />
      </a>
    </section>

    <nav id="close-button">
      <!-- Button to close the overlay navigation -->
      <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">X</a>
    </nav>

    <nav class="top-navigation">
      <a href="javascript:void(0)" class="active" onclick="openNav()">
        <p>Works ☰</p>
      </a>
    </nav>
    <!-- ********************************************** -->

    <section class="hero">
      <hgroup class="slide-up show-on-scroll">
        <h1>Reserve & Shop Infographics</h1>
        <!-- <p>Insert Description here</p> -->
      </hgroup>
      <figure class="slide-up show-on-scroll">
        <img
          src="assets/images/works/rs-infographics/hero.gif"
          alt="rs infographic"
        />
      </figure>
    </section>

    <section class="content">
      <p class="slide-up show-on-scroll">
        Using Adobe Photoshop and After Effects, I designed these animated
        infographics to display data on
        <b>people’s shopping mall preferences during COVID-19</b> on Reserve &
        Shop’s social media pages.
      </p>
      <figure class="slide-up show-on-scroll">
        <img
          src="assets/images/works/rs-infographics/info1.gif"
          alt="rs infographic"
        />
        <img
          src="assets/images/works/rs-infographics/info2.gif"
          alt="rs infographic"
        />
        <img
          src="assets/images/works/rs-infographics/info3.gif"
          alt="rs infographic"
        />
        <img
          src="assets/images/works/rs-infographics/info4.jpg"
          alt="rs infographic"
        />
        <img
          src="assets/images/works/rs-infographics/info5.gif"
          alt="rs infographic"
        />
      </figure>
    </section>

    <!-- Table of contents ********************************************** -->

    <section id="table-of-contents"></section>

    <nav class="link_to_next_page">
      <a href="best-practices.html">
        <div class="text_container">
          <p>Best Practices for Reopening During COVID-19</p>
        </div>
      </a>
    </nav>

    <!-- My scripts -->
    <script>
      /* Open when someone clicks on the span element */
      function openNav() {
        document.getElementById("table-of-contents").style.width = "100%";
        document.getElementById("table-of-contents").style.padding = "100px";
        document.getElementById("close-button").style.display = "flex";
      }

      /* Close when someone clicks on the "x" symbol inside the overlay */
      function closeNav() {
        document.getElementById("table-of-contents").style.width = "0%";
        document.getElementById("table-of-contents").style.padding = "0px";
        document.getElementById("close-button").style.display = "none";
      }
    </script>

    <script src="js/show-on-scroll.js"></script>

    <script src="js/tableOfContents.js"></script>
  </body>
</html>
