<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Sharon Ku</title>

    <!-- Add favicon -->
    <link rel="icon" href="assets/images/logo.png" sizes="16x16" />

    <!-- CSS sheets -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/work.css" />
    <link rel="stylesheet" href="css/works/butterfly-automata.css" />
  </head>

  <body>
    <!-- Top navigation ********************************************** -->
    <section class="logo">
      <a href="index.html">
        <img src="assets/images/logo.png" alt="logo" />
      </a>
    </section>

    <nav id="close-button">
      <!-- Button to close the overlay navigation -->
      <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">X</a>
    </nav>

    <nav class="top-navigation">
      <a href="javascript:void(0)" class="active" onclick="openNav()">
        <p>Works ☰</p>
      </a>
    </nav>
    <!-- ********************************************** -->

    <section class="hero">
      <hgroup class="slide-up show-on-scroll">
        <h1>Butterfly Automata</h1>
        <!-- <p>Insert Description here</p> -->
      </hgroup>
      <figure class="slide-up show-on-scroll">
        <img
          src="assets/images/works/butterfly-automata/1.jpg"
          alt="butterfly automata image"
        />
      </figure>
    </section>

    <section class="content">
      <p class="slide-up show-on-scroll">
        I designed and constructed a
        <b>butterfly automata out of steel and recycled plywood</b>. This
        project introduced me to several hand and machine tools, such as the
        table saw, band saw, drill press, and belt sander.
      </p>

      <figure class="slide-up show-on-scroll">
        <img
          src="assets/images/works/butterfly-automata/2.jpg"
          alt="butterfly automata"
        />
        <p class="slide-up show-on-scroll">
          This artifact uses a hinge mechanism, wheels, and axles. The energy
          from the rotation of the handle is translated into the linear
          up-and-down motion of the vertical axles, that then push against the
          butterfly's wings to create a flapping effect.
        </p>
        <section class="gif">
          <img
            src="assets/images/works/butterfly-automata/butterfly-animation.gif"
            alt="butterfly automata"
          />
        </section>

        <img
          src="assets/images/works/butterfly-automata/3.jpg"
          alt="butterfly automata"
        />
        <img
          src="assets/images/works/butterfly-automata/4.jpg"
          alt="butterfly automata"
        />
        <p class="slide-up show-on-scroll">
          The piece showcases an interesting juxtaposition between the natural
          and artifical by representing the butterfly's movement with the use of
          wood and metal. The finger joints and flower spacer add visual
          interest to the sides of the box.
        </p>
        <img
          src="assets/images/works/butterfly-automata/5.jpg"
          alt="butterfly automata"
        />
      </figure>
    </section>

    <!-- Table of contents ********************************************** -->

    <section id="table-of-contents"></section>

    <nav class="link_to_next_page">
      <a href="index.html">
        <div class="text_container">
          <p>Return to Home</p>
        </div>
      </a>
    </nav>

    <!-- My scripts -->

    <script>
      /* Open when someone clicks on the span element */
      function openNav() {
        document.getElementById("table-of-contents").style.width = "100%";
        document.getElementById("table-of-contents").style.padding = "100px";
        document.getElementById("close-button").style.display = "flex";
      }

      /* Close when someone clicks on the "x" symbol inside the overlay */
      function closeNav() {
        document.getElementById("table-of-contents").style.width = "0%";
        document.getElementById("table-of-contents").style.padding = "0px";
        document.getElementById("close-button").style.display = "none";
      }
    </script>

    <script src="js/show-on-scroll.js"></script>

    <script src="js/tableOfContents.js"></script>
  </body>
</html>
